version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=charco_user
      - DB_PASS=charco_pass
      - DB_NAME=charco_db
      - APP_URL=http://localhost:8080/
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=charco_db
      - MYSQL_USER=charco_user
      - MYSQL_PASSWORD=charco_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./DataBase/charco_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

volumes:
  mysql_data:
